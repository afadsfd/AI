<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect: redirect all paths to index.html
      var base = '/AI/';
      var url = window.location.pathname;
      if (url.startsWith(base)) {
        // Redirect to base with hash-based path for SPA to handle
        window.location.replace(base + '#' + url.slice(base.length) + window.location.search + window.location.hash);
      } else {
        window.location.replace(base);
      }
    </script>
  </head>
</html>
